<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crisp for Jira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="topbar">
      <div id="logo">
        <svg width="22" height="22" viewBox="0 0 128 128" fill="none">
          <defs>
            <linearGradient id="logoGradBg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0f172a" />
              <stop offset="100%" stop-color="#1e1b4b" />
            </linearGradient>
            <linearGradient id="logoGradC" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff" />
              <stop offset="100%" stop-color="#a5b4fc" />
            </linearGradient>
          </defs>
          <rect width="128" height="128" rx="24" fill="url(#logoGradBg)" />
          <path
            d="M 69 43 A 30 30 0 1 0 69 85"
            fill="none"
            stroke="url(#logoGradC)"
            stroke-width="13"
            stroke-linecap="round"
          />
          <line
            x1="74"
            y1="53"
            x2="105"
            y2="53"
            stroke="white"
            stroke-width="5.5"
            stroke-linecap="round"
            opacity="0.95"
          />
          <line
            x1="74"
            y1="64"
            x2="112"
            y2="64"
            stroke="white"
            stroke-width="5.5"
            stroke-linecap="round"
            opacity="0.55"
          />
          <line
            x1="74"
            y1="75"
            x2="98"
            y2="75"
            stroke="white"
            stroke-width="5.5"
            stroke-linecap="round"
            opacity="0.28"
          />
          <circle cx="69" cy="43" r="5.5" fill="#fbbf24" />
        </svg>
        Crisp for Jira
      </div>
      <form id="search-form">
        <input
          id="search-input"
          type="text"
          placeholder="Ticket key, filter ID, JQL, or Jira URL"
          autocomplete="off"
        />
        <button type="submit" id="search-btn">Open</button>
      </form>

      <div id="tab-bar">
        <button class="tab-btn active" data-tab="jira" id="tab-jira">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
          Jira
        </button>
        <button class="tab-btn" data-tab="labels" id="tab-labels">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
            />
            <line x1="7" y1="7" x2="7.01" y2="7" />
          </svg>
          Labels
        </button>
        <button class="tab-btn" data-tab="notes" id="tab-notes">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          Notes
        </button>
        <button class="tab-btn" data-tab="mindmap" id="tab-mindmap">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="5" cy="12" r="2.5" />
            <circle cx="19" cy="5" r="2.5" />
            <circle cx="19" cy="19" r="2.5" />
            <line x1="7.5" y1="12" x2="16.5" y2="6" />
            <line x1="7.5" y1="12" x2="16.5" y2="18" />
          </svg>
          Mindmap
        </button>
        <button class="tab-btn" data-tab="history" id="tab-history">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 8v4l3 3" />
            <circle cx="12" cy="12" r="9" />
          </svg>
          History
        </button>
      </div>

      <div style="flex: 1"></div>

      <button class="top-btn icon-only" id="settings-btn" title="Settings" aria-label="Settings">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
      </button>
    </div>

    <div id="app-body">
      <!-- LEFT: Groups -->
      <div id="sidebar">
        <div class="middle-header" style="justify-content: space-between; padding: 12px 10px">
          <span
            style="
              font-weight: 600;
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              color: var(--text-tertiary);
            "
          >
            Lists
          </span>
          <span style="display: flex; gap: 4px">
            <button
              class="top-btn icon-only"
              id="find-duplicates-btn"
              title="Find Duplicates"
              aria-label="Find Duplicates"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="8" y="8" width="12" height="12" rx="2" />
                <path d="M4 16V4a2 2 0 0 1 2-2h12" />
              </svg>
            </button>
            <button
              class="top-btn icon-only collapse-btn"
              id="sidebar-collapse-btn"
              title="Collapse Sidebar"
              aria-label="Collapse Sidebar"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="11 17 6 12 11 7" />
                <polyline points="18 17 13 12 18 7" />
              </svg>
            </button>
          </span>
        </div>
        <div id="group-list"></div>
        <button id="add-group-btn" title="New Group">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="resizer" id="resizer-sidebar"></div>

      <!-- MIDDLE: Ticket List -->
      <div id="middle">
        <div class="middle-header">
          <button
            class="top-btn icon-only collapse-btn"
            id="middle-collapse-btn"
            title="Collapse Items"
            aria-label="Collapse Items"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="11 17 6 12 11 7" />
              <polyline points="18 17 13 12 18 7" />
            </svg>
          </button>
          <span id="current-group-name" style="flex: 1">Inbox</span>
          <button
            class="top-btn icon-only"
            id="bulk-select-btn"
            title="Select tickets"
            aria-label="Select tickets"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="5" width="4" height="4" rx="0.5" />
              <line x1="10" y1="7" x2="21" y2="7" />
              <rect x="3" y="11" width="4" height="4" rx="0.5" />
              <line x1="10" y1="13" x2="21" y2="13" />
              <rect x="3" y="17" width="4" height="4" rx="0.5" />
              <line x1="10" y1="19" x2="21" y2="19" />
            </svg>
          </button>
          <button
            class="top-btn icon-only"
            id="refresh-all-btn"
            title="Refresh List"
            aria-label="Refresh List"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-2.38-7.72" />
            </svg>
          </button>
        </div>
        <div id="group-search-bar">
          <input
            id="group-search-input"
            type="text"
            placeholder="Filter tickets..."
            autocomplete="off"
          />
        </div>
        <div id="ticket-list"></div>
        <div id="bulk-toolbar">
          <span id="bulk-count">0 selected</span>
          <select id="bulk-move-select" class="bulk-move-select">
            <option value="">Move to…</option>
          </select>
          <button class="top-btn primary" id="bulk-delete-btn">Delete</button>
          <button class="top-btn" id="bulk-done-btn">Done</button>
        </div>
      </div>

      <div class="resizer" id="resizer-middle"></div>

      <!-- HISTORY TABLE PANE (full-width grid when History group is active) -->
      <div id="history-pane"></div>

      <!-- RIGHT: Reading Pane -->
      <div id="reading">
        <div class="empty-msg" id="reading-empty" style="margin-top: 100px">
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            style="color: var(--text-tertiary); margin-bottom: 16px"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
          <h2>No ticket selected</h2>
          <p>Select a ticket from the list to view its details.</p>
        </div>
        <div class="reading-content" id="reading-content" style="display: none"></div>
      </div>

      <!-- MIND MAP PANE (for Mindmap mode) -->
      <div id="mindmap-pane">
        <div class="mm-sidebar" id="mm-sidebar-panel">
          <div class="mm-sidebar-header">
            <span class="mm-sidebar-label">Diagrams</span>
            <button
              class="top-btn icon-only"
              id="mm-add-btn"
              title="New Diagram"
              aria-label="New Diagram"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>
          <div id="mm-diagram-list"></div>
        </div>
        <div class="resizer" id="resizer-mm-sidebar"></div>
        <div class="mm-editor-pane" id="mm-editor-panel">
          <div class="mm-editor-header">
            <span class="mm-editor-label">Diagram Code</span>
            <button
              class="top-btn icon-only"
              id="mm-refresh-btn"
              title="Refresh diagram"
              aria-label="Refresh diagram"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 4 23 10 17 10" />
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
              </svg>
            </button>
            <button
              class="top-btn icon-only"
              id="mm-copy-btn"
              title="Copy diagram code"
              aria-label="Copy diagram code"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
            </button>
          </div>
          <textarea
            id="mm-code"
            class="mm-code-editor"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
          ></textarea>
        </div>
        <div class="resizer" id="resizer-mm-editor"></div>
        <div class="mm-preview-pane">
          <div class="mm-zoom-controls">
            <button
              class="top-btn icon-only"
              id="mm-zoom-in-btn"
              title="Zoom in"
              aria-label="Zoom in"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                <line x1="11" y1="8" x2="11" y2="14" />
                <line x1="8" y1="11" x2="14" y2="11" />
              </svg>
            </button>
            <button
              class="top-btn icon-only"
              id="mm-zoom-reset-btn"
              title="Reset view"
              aria-label="Reset view"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 3h6v6H3z" />
                <path d="M15 3h6v6h-6z" />
                <path d="M3 15h6v6H3z" />
                <path d="M15 15h6v6h-6z" />
              </svg>
            </button>
            <button
              class="top-btn icon-only"
              id="mm-zoom-out-btn"
              title="Zoom out"
              aria-label="Zoom out"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                <line x1="8" y1="11" x2="14" y2="11" />
              </svg>
            </button>
          </div>
          <div id="mm-preview" class="mm-preview"></div>
        </div>
      </div>

      <!-- NOTES CANVAS PANE (for Notes mode) -->
      <div id="notes-canvas-pane">
        <div class="nc-sidebar" id="nc-sidebar">
          <div class="nc-sidebar-header">
            <span class="nc-sidebar-label">Notes</span>
          </div>
          <div id="nc-notes-list"></div>
          <button id="add-note-btn" title="New Note" aria-label="New Note">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
        </div>
        <div class="resizer" id="resizer-nc-sidebar"></div>
        <div class="nc-main" id="nc-main"></div>
      </div>

      <div class="resizer" id="resizer-notes"></div>

      <!-- RIGHT 2: Notes Pane -->
      <div id="notes-pane">
        <div
          class="middle-header"
          style="border-bottom: 1px solid var(--border-subtle); background: var(--card)"
        >
          Notes
          <button class="modal-close" id="notes-pane-close">&times;</button>
        </div>
        <textarea
          id="notes-text"
          placeholder="Type personal notes here... Saved automatically to your browser."
        ></textarea>
      </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-overlay" class="hidden">
      <div
        id="settings-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-modal-title"
      >
        <div class="modal-header">
          <span id="settings-modal-title">Jira Connection</span>
          <button class="modal-close" id="settings-close" aria-label="Close settings">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="cfg-email" type="text" placeholder="user@company.com" />
          </div>
          <div class="form-group">
            <label class="form-label">API Token</label>
            <input class="form-input" id="cfg-token" type="password" />
            <div class="form-hint">
              <a
                href="https://id.atlassian.com/manage-profile/security/api-tokens"
                target="_blank"
                rel="noopener noreferrer"
              >
                Create an API token →
              </a>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Jira URL</label>
            <input
              class="form-input"
              id="cfg-url"
              type="text"
              placeholder="https://your-domain.atlassian.net"
            />
          </div>
        </div>
        <div class="modal-footer">
          <button class="top-btn" id="settings-cancel">Cancel</button>
          <button class="top-btn primary" id="settings-save">Save</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <!-- LIBRARIES & APP -->
    <script src="lib/mermaid.min.js"></script>
    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/middle.js"></script>
    <script src="js/history.js"></script>
    <script src="js/reading-content.js"></script>
    <script src="js/reading-bindings.js"></script>
    <script src="js/reading.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/labels-tab.js"></script>
    <script src="js/notes-canvas.js"></script>
    <script src="js/notes.js"></script>
    <script src="js/drag-drop.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/tickets.js"></script>
    <script src="js/mindmap.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/beam.js"></script>
    <script src="js/init.js"></script>
  </body>
</html>
