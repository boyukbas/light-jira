<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light Jira</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7000ff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="topbar">
      <div id="logo">
        <svg width="22" height="22" viewBox="0 0 100 100" fill="none">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7000ff" />
              <stop offset="100%" stop-color="#c13584" />
            </linearGradient>
          </defs>
          <rect width="100" height="100" rx="30" fill="url(#logoGrad)" />
          <path d="M55 20 L30 55 H45 L40 85 L65 50 H50 L55 20Z" fill="white" />
        </svg>
        Light Jira
      </div>
      <form id="search-form">
        <input id="search-input" type="text" placeholder="e.g. PROJ-123 or paste any Jira URL" />
        <button type="submit" id="search-btn">Open Ticket</button>
        <button type="button" id="filter-btn" class="top-btn" title="Load by Filter/JQL">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
          Filter
        </button>
      </form>

      <div id="tab-bar">
        <button class="tab-btn active" data-tab="jira" id="tab-jira">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
          Jira
        </button>
        <button class="tab-btn" data-tab="notes" id="tab-notes">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          Notes
        </button>
      </div>

      <div style="flex: 1"></div>

      <button class="top-btn icon-only" id="history-toggle-btn" title="View History">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M12 8v4l3 3" />
          <circle cx="12" cy="12" r="9" />
        </svg>
      </button>
      <button class="top-btn icon-only" id="settings-btn" title="Settings">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
      </button>
    </div>

    <div id="app-body">
      <!-- LEFT: Groups -->
      <div id="sidebar">
        <div class="middle-header" style="justify-content: space-between; padding: 12px 10px">
          <span
            style="
              font-weight: 600;
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              color: var(--text-tertiary);
            "
          >
            Lists
          </span>
          <button
            class="top-btn icon-only collapse-btn"
            onclick="toggleCollapse('sidebar')"
            title="Collapse Sidebar"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="11 17 6 12 11 7" />
              <polyline points="18 17 13 12 18 7" />
            </svg>
          </button>
        </div>
        <div id="group-list"></div>
        <button id="add-group-btn" title="New Group">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="resizer" id="resizer-sidebar"></div>

      <!-- MIDDLE: Ticket List -->
      <div id="middle">
        <div class="middle-header">
          <button
            class="top-btn icon-only collapse-btn"
            id="middle-collapse-btn"
            onclick="toggleCollapse('middle')"
            title="Collapse Items"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="11 17 6 12 11 7" />
              <polyline points="18 17 13 12 18 7" />
            </svg>
          </button>
          <span id="current-group-name" style="flex: 1">Inbox</span>
          <button class="top-btn icon-only" id="refresh-all-btn" title="Refresh List">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-2.38-7.72" />
            </svg>
          </button>
        </div>
        <div id="ticket-list"></div>
      </div>

      <div class="resizer" id="resizer-middle"></div>

      <!-- RIGHT: Reading Pane -->
      <div id="reading">
        <div class="empty-msg" id="reading-empty" style="margin-top: 100px">
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            style="color: var(--text-tertiary); margin-bottom: 16px"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
          </svg>
          <h2>No ticket selected</h2>
          <p>Select a ticket from the list to view its details.</p>
        </div>
        <div class="reading-content" id="reading-content" style="display: none"></div>
      </div>

      <!-- NOTES EDITOR PANE (for Notes mode) -->
      <div id="notes-editor-pane">
        <div class="notes-editor-header">
          <input
            type="text"
            class="note-title-input"
            id="note-title-input"
            placeholder="Untitled Note"
          />
          <span class="note-date" id="note-date-display"></span>
        </div>
        <textarea id="note-editor-textarea" placeholder="Start writing..."></textarea>
      </div>

      <div class="resizer" id="resizer-notes"></div>

      <!-- RIGHT 2: Notes Pane -->
      <div id="notes-pane">
        <div
          class="middle-header"
          style="border-bottom: 1px solid var(--border-subtle); background: var(--card)"
        >
          Notes
          <button class="modal-close" onclick="toggleNotes()">&times;</button>
        </div>
        <textarea
          id="notes-text"
          placeholder="Type personal notes here... Saved automatically to your browser."
          oninput="saveNotes(this.value)"
        ></textarea>
      </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-modal">
        <div class="modal-header">
          Jira Connection
          <button class="modal-close" id="settings-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="cfg-email" type="text" placeholder="user@company.com" />
          </div>
          <div class="form-group">
            <label class="form-label">API Token</label>
            <input class="form-input" id="cfg-token" type="password" />
          </div>
          <div class="form-group">
            <label class="form-label">Jira URL</label>
            <input
              class="form-input"
              id="cfg-url"
              type="text"
              placeholder="https://your-domain.atlassian.net"
            />
          </div>
          <div class="form-group">
            <label class="form-label">History Limit (Max Items)</label>
            <input
              class="form-input"
              id="cfg-hist-limit"
              type="number"
              min="10"
              max="1000"
              placeholder="e.g. 100"
            />
          </div>
          <div
            class="form-group"
            style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px"
          >
            <label class="form-label">Cloud Proxy URL (Optional)</label>
            <input
              class="form-input"
              id="cfg-proxy-url"
              type="text"
              placeholder="https://xyz.lambda-url.region.on.aws"
            />
            <div style="font-size: 11px; opacity: 0.6; margin-top: 4px">
              Leave empty for local proxy (localhost:3000)
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="top-btn" id="settings-cancel">Cancel</button>
          <button class="top-btn primary" id="settings-save">Save</button>
        </div>
      </div>
    </div>

    <!-- F2 MODAL -->
    <div id="f2-modal" class="hidden">
      <div id="f2-box">
        <div
          style="
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
          "
        >
          Quick Open Ticket
        </div>
        <form id="f2-form">
          <input type="text" id="f2-input" placeholder="e.g. WRK-12345" autocomplete="off" />
        </form>
      </div>
    </div>

    <div id="toast"></div>

    <!-- FILTER MODAL -->
    <div id="filter-overlay" class="hidden">
      <div id="filter-modal">
        <div class="modal-header">
          Load Filter / JQL
          <button class="modal-close" id="filter-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Filter URL, Filter ID, or JQL Query</label>
            <input
              class="form-input"
              id="filter-input"
              type="text"
              placeholder="e.g. https://site.atlassian.net/issues/?filter=12345"
            />
            <div style="font-size: 11px; opacity: 0.6; margin-top: 6px">
              Supports: Filter URL, Filter ID (number), or raw JQL query
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Group Name (optional)</label>
            <input
              class="form-input"
              id="filter-group-name"
              type="text"
              placeholder="Auto-detected from filter name"
            />
          </div>
        </div>
        <div class="modal-footer">
          <button class="top-btn" id="filter-cancel">Cancel</button>
          <button class="top-btn primary" id="filter-load">Load Tickets</button>
        </div>
      </div>
    </div>

    <!-- LIBRARIES & APP -->
    <script src="api.js"></script>
    <script src="utils.js"></script>
    <script src="app.js"></script>
  </body>
</html>
